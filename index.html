<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#3a2a1c" />
<title>倉庫番</title>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{font-family:system-ui,sans-serif;color:#3a2a1c;background:linear-gradient(180deg,#d4b896,#a8825a);touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent}
#app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;padding:8px;gap:8px}
.title{font-family:"Mochiy Pop P One",sans-serif;font-size:18px;color:#3a2a1c;margin:4px 0}
.hud{display:flex;justify-content:space-between;width:100%;max-width:480px;gap:8px;font-size:13px;font-weight:bold}
.hud .box{background:#fff;border:2px solid #3a2a1c;border-radius:10px;padding:5px 10px}
.board-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-width:480px;min-height:0}
canvas{background:#3a2a1c;border:3px solid #1a0f08;border-radius:8px;max-width:100%;max-height:100%}
.dpad{display:grid;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px;gap:6px;justify-content:center}
.dpad button{background:#3a2a1c;color:#fff;border:3px solid #1a0f08;border-radius:14px;font-size:22px;cursor:pointer;box-shadow:2px 2px 0 #1a0f08;font-family:inherit}
.dpad button:active{transform:translate(2px,2px);box-shadow:0 0 0 #1a0f08}
.dpad .up{grid-column:2;grid-row:1}.dpad .left{grid-column:1;grid-row:2}.dpad .down{grid-column:2;grid-row:2}.dpad .right{grid-column:3;grid-row:2}
.actions{display:flex;gap:8px;justify-content:center;margin-top:6px}
.actions button{background:#fff;color:#3a2a1c;border:3px solid #3a2a1c;padding:8px 16px;border-radius:10px;font-size:12px;cursor:pointer;box-shadow:2px 2px 0 #3a2a1c;font-family:inherit}
.win{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:50}
.win.show{display:flex}
.win .panel{background:#fff;border:3px solid #3a2a1c;border-radius:18px;padding:20px;text-align:center;display:flex;flex-direction:column;gap:10px}
.win .panel h2{margin:0;color:#10b981;font-family:"Mochiy Pop P One",sans-serif}
.win .panel button{background:#10b981;color:#fff;border:3px solid #3a2a1c;padding:10px 18px;border-radius:999px;font-family:"Mochiy Pop P One",sans-serif;cursor:pointer;font-size:14px;box-shadow:3px 3px 0 #3a2a1c}
</style>
</head>
<body>
<div id="app">
<h1 class="title">倉庫番 📦</h1>
<div class="hud">
  <div class="box">Lv: <span id="lv">1</span></div>
  <div class="box">手数: <span id="mv">0</span></div>
</div>
<div class="board-wrap"><canvas id="cv" width="320" height="320"></canvas></div>
<div class="dpad">
  <button class="up" data-dir="u">▲</button>
  <button class="left" data-dir="l">◀</button>
  <button class="down" data-dir="d">▼</button>
  <button class="right" data-dir="r">▶</button>
</div>
<div class="actions">
  <button id="btn-undo">↶ Undo</button>
  <button id="btn-reset">↺ リセット</button>
  <button id="btn-skip">▶ スキップ</button>
</div>
</div>
<div class="win" id="win">
  <div class="panel">
    <h2>🎉 クリア！</h2>
    <div>Lv <span id="w-lv">1</span></div>
    <button id="btn-next">次のステージ</button>
  </div>
</div>
<script>
(()=>{
'use strict';
// Sokoban levels: # wall, . floor, $ box, * box on goal, @ player, + player on goal,. = goal-floor (we use '!' for goal)
const LEVELS=[
['#####','#.@.#','#.$!#','#...#','#####'],
['######','#@...#','#.$$.#','#.!!.#','#....#','######'],
['#######','#@....#','#.$.$.#','#.!.!.#','#.....#','#######'],
['########','#@.....#','#.####.#','#.$..$.#','#.!.!..#','#......#','########'],
['########','#.....@#','#.$$$..#','#.!!!..#','#......#','########'],
['#########','#@......#','#.$.$.$.#','#.!.!.!.#','#.......#','#########']
];
const $=(id)=>document.getElementById(id);
const cv=$('cv'),ctx=cv.getContext('2d');
let lv=0,grid=null,player={x:0,y:0},moves=0,history=[];
function load(idx){
  lv=idx;moves=0;history=[];
  const raw=LEVELS[idx%LEVELS.length];
  const g=raw.map(r=>r.split('').map(c=>{
    if(c==='@'){return'.'}if(c==='+'){return'!'}return c;
  }));
  // find player
  raw.forEach((r,y)=>r.split('').forEach((c,x)=>{if(c==='@'||c==='+'){player={x,y}}}));
  grid=g;render();
  $('lv').textContent=idx+1;$('mv').textContent=0;
}
function render(){
  const H=grid.length,W=grid[0].length;
  const cell=Math.floor(Math.min(cv.width/W,cv.height/H));
  ctx.fillStyle='#1a0f08';ctx.fillRect(0,0,cv.width,cv.height);
  const ox=(cv.width-cell*W)/2,oy=(cv.height-cell*H)/2;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const c=grid[y][x];
    const px=ox+x*cell,py=oy+y*cell;
    if(c==='#'){ctx.fillStyle='#5a3e22';ctx.fillRect(px,py,cell,cell);ctx.strokeStyle='#3a2a1c';ctx.strokeRect(px+1,py+1,cell-2,cell-2)}
    else{ctx.fillStyle='#d4b896';ctx.fillRect(px,py,cell,cell)}
    if(c==='!'){ctx.fillStyle='#10b981';ctx.beginPath();ctx.arc(px+cell/2,py+cell/2,cell/4,0,Math.PI*2);ctx.fill()}
    if(c==='$'){ctx.fillStyle='#a8825a';ctx.fillRect(px+4,py+4,cell-8,cell-8);ctx.strokeStyle='#3a2a1c';ctx.lineWidth=2;ctx.strokeRect(px+4,py+4,cell-8,cell-8);ctx.beginPath();ctx.moveTo(px+4,py+4);ctx.lineTo(px+cell-4,py+cell-4);ctx.moveTo(px+cell-4,py+4);ctx.lineTo(px+4,py+cell-4);ctx.stroke()}
    if(c==='*'){ctx.fillStyle='#10b981';ctx.fillRect(px+4,py+4,cell-8,cell-8);ctx.strokeStyle='#3a2a1c';ctx.lineWidth=2;ctx.strokeRect(px+4,py+4,cell-8,cell-8)}
  }
  // player
  const px=ox+player.x*cell,py=oy+player.y*cell;
  ctx.font=`${cell-8}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🧑‍🌾',px+cell/2,py+cell/2);
}
function move(dx,dy){
  const nx=player.x+dx,ny=player.y+dy;
  if(grid[ny][nx]==='#')return;
  // box?
  if(grid[ny][nx]==='$'||grid[ny][nx]==='*'){
    const bx=nx+dx,by=ny+dy;
    if(grid[by][bx]==='#'||grid[by][bx]==='$'||grid[by][bx]==='*')return;
    history.push(JSON.stringify({grid,player}));
    // move box
    const goalDest=grid[by][bx]==='!';
    grid[by][bx]=goalDest?'*':'$';
    grid[ny][nx]=grid[ny][nx]==='*'?'!':'.';
    player.x=nx;player.y=ny;moves++;
    beep(660,.06);
  }else{
    history.push(JSON.stringify({grid,player}));
    player.x=nx;player.y=ny;moves++;
    beep(440,.04);
  }
  $('mv').textContent=moves;
  render();
  // win check
  let remaining=0;
  for(const r of grid)for(const c of r)if(c==='$')remaining++;
  if(remaining===0){
    setTimeout(()=>{$('w-lv').textContent=lv+1;$('win').classList.add('show');fanfare()},200);
  }
}
function undo(){
  if(history.length===0)return;
  const s=JSON.parse(history.pop());
  grid=s.grid;player=s.player;moves=Math.max(0,moves-1);
  $('mv').textContent=moves;render();
}
let ac=null;const en=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac};
const beep=(f,d,t='triangle',g=.1)=>{const a=en();const o=a.createOscillator();const gn=a.createGain();o.type=t;o.frequency.value=f;gn.gain.value=g;gn.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(gn).connect(a.destination);o.start();o.stop(a.currentTime+d)};
const fanfare=()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.18),i*100))};
document.querySelectorAll('.dpad button').forEach(b=>{
  b.addEventListener('click',()=>{en();const d=b.dataset.dir;if(d==='u')move(0,-1);if(d==='d')move(0,1);if(d==='l')move(-1,0);if(d==='r')move(1,0)});
});
window.addEventListener('keydown',e=>{en();if(e.key==='ArrowUp')move(0,-1);if(e.key==='ArrowDown')move(0,1);if(e.key==='ArrowLeft')move(-1,0);if(e.key==='ArrowRight')move(1,0);if(e.key==='z')undo()});
$('btn-undo').addEventListener('click',()=>{en();undo()});
$('btn-reset').addEventListener('click',()=>{en();load(lv)});
$('btn-skip').addEventListener('click',()=>{en();load((lv+1)%LEVELS.length)});
$('btn-next').addEventListener('click',()=>{en();$('win').classList.remove('show');load((lv+1)%LEVELS.length)});
load(0);
})();
</script>
</body>
</html>
